name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: input
    id: switch
    attributes:
      label: Switch model (if relevant)
      placeholder: e.g. Netgear GS748TP
  - type: dropdown
    id: host
    attributes:
      label: How are you running Switchkeeper?
      options:
        - Docker / server
        - Desktop app
        - From source (Node)
        - MCP
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. v0.1.0 or commit sha
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste any output. Redact real IPs, hostnames, and community strings.
      render: shell
