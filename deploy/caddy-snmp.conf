# Example Caddy site block fronting the Switchkeeper server with HTTPS.
# Replace the hostname and upstream IP:port with your own.
switchkeeper.example.com {
  # `import internal` uses Caddy's internal CA (self-signed). Drop it and Caddy
  # will obtain a real certificate via ACME if the host is publicly reachable.
  import internal
  reverse_proxy 10.0.0.10:7341
}
